# generic modules
- type: entity
  id: BorgModuleUppies
  parent: [ BaseBorgModule, BaseProviderBorgModule ]
  name: personnel transport cyborg module
  description: A universal cyborg module which allows the unit to carry personnel.
  components:
  - type: Tag
    tags:
      - BorgModuleGeneric
      - PersonnelStorage
  - type: Sprite
    layers:
    - state: generic
    - state: icon-hands
  - type: ItemBorgModule
    hands:
    - forceRemovable: true
      hand:
        emptyRepresentative: MobResomi
        emptyLabel: borg-slot-uppies-empty
        whitelist:
          components:
          - HumanoidAppearance
    - forceRemovable: true
      hand:
        emptyRepresentative: MobResomi
        emptyLabel: borg-slot-uppies-empty
        whitelist:
          components:
          - HumanoidAppearance
  - type: BorgModuleIcon
    icon: { sprite: _Starlight/Interface/Actions/actions_borg.rsi, state: hands }

# region Service
- type: entity
  id: BorgModuleBartending
  parent: [ BaseBorgModuleService, BaseProviderBorgModule ]
  name: bartending cyborg module
  components:
  - type: Sprite
    layers:
    - state: service
    - state: icon-bartending
  - type: ItemBorgModule
    hands:
    - item: DrinkGlass
      hand:
        emptyLabel: borg-slot-small-containers-empty
        emptyRepresentative: DrinkGlass
        whitelist:
          components:
          - FitsInDispenser
    - item: DrinkGlass
      hand:
        emptyLabel: borg-slot-small-containers-empty
        emptyRepresentative: DrinkGlass
        whitelist:
          components:
          - FitsInDispenser
    - item: DrinkShaker
      hand:
        emptyLabel: borg-slot-small-containers-empty
        emptyRepresentative: DrinkShaker
        whitelist:
          components:
          - FitsInDispenser
          - NFShaker
    - item: BorgDropper
    - item: BarSpoon
    - hand:
        emptyLabel: borg-slot-bottles-empty
        emptyRepresentative: DrinkWhiskeyBottleFull
        whitelist:
          tags:
          - DrinkBottle
          - DrinkCarton
    # Hardlight start
    - item: Lighter
      hand:
      emptyRepresentative: Lighter
      emptyLabel: borg-placeholder-display-name-lighter
      whitelist:
        components:
        - NFLighter
    - hand:
      emptyRepresentative: CigPackRed
      emptyLabel: borg-placeholder-display-name-smokes
      whitelist:
        components:
        - NFSmokeableContainer
        tags:
        - Cigar
        - Cigarette
    # Hardlight end
  - type: BorgModuleIcon
    icon: { sprite: _Starlight/Interface/Actions/actions_borg.rsi, state: bartending-module }

- type: entity
  id: BorgModuleBooks
  parent: [ BaseBorgModuleService, BaseProviderBorgModule ]
  name: bookkeeping cyborg module
  components:
  - type: Sprite
    layers:
    - state: service
    - state: icon-pen
  - type: ItemBorgModule
    hands:
    - item: Pen
      hand:
      emptyRepresentative: Pen
      emptyLabel: borg-slot-pens
      whitelist:
        tags:
        - Write
    - hand:
        emptyLabel: borg-slot-documents-empty
        emptyRepresentative: Paper
        whitelist:
          tags:
          - Book
          - Dice
          - Document
          - Figurine
          - TabletopBoard
          - Write
    - hand:
        emptyLabel: borg-slot-documents-empty
        emptyRepresentative: BookBase
        whitelist:
          tags:
          - Book
          - Dice
          - Document
          - Figurine
          - TabletopBoard
          - Write
    - item: BooksBag
      hand:
      emptyRepresentative: BooksBag
      emptyLabel: borg-slot-book-bags
      whitelist:
        components:
        - NFBookBag
    - item: HandLabeler
    - item: RubberStampApproved
    - item: RubberStampDenied
  - type: BorgModuleIcon
    icon: { sprite: _Starlight/Interface/Actions/actions_borg.rsi, state: bookkeeping-module }

- type: entity
