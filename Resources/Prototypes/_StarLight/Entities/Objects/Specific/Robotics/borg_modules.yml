    - state: service
    - state: icon-gardening
  - type: ItemBorgModule
    hands:
    - item: HydroponicsToolMiniHoe
    - item: HydroponicsToolSpade
    - item: HydroponicsToolClippers
    - item: DiseaseSwab
      hand:
        emptyLabel: borg-slot-swabs-empty
        emptyRepresentative: DiseaseSwab
        whitelist:
          components:
          - BotanySwab
    - item: HydroponicsToolScythe
    - item: HydroponicsToolHatchet
    - item: PlantBag
    - hand:
        emptyLabel: borg-slot-seeds-empty
        emptyRepresentative: WheatSeeds
        whitelist:
          components:
          - Seed
    - hand:
        emptyLabel: borg-slot-produce-empty
        emptyRepresentative: FoodApple
        whitelist:
          components:
          - Produce
    - item: Bucket
  - type: BorgModuleIcon
    icon: { sprite: Interface/Actions/actions_borg.rsi, state: gardening-module }

- type: entity
  id: BorgModuleCooking
  parent: [ BaseBorgModuleService, BaseProviderBorgModule ]
  name: cooking cyborg module
  components:
  - type: Sprite
    layers:
    - state: service
    - state: icon-cooking
  - type: ItemBorgModule
    hands:
    - item: BorgDropper
    - item: Beaker
      hand:
        emptyLabel: borg-slot-small-containers-empty
        emptyRepresentative: Beaker
        whitelist:
          components:
          - FitsInDispenser
          - Utensil # Hardlight
          - NFCookware # Hardlight
    - hand:
        emptyLabel: borg-slot-ingredient-empty
        emptyRepresentative: ReagentContainerFlour
        whitelist:
          tags:
          - Slice
          - Condiment
          - Packet
          - Meat
          - DrinkCarton
          components:
          - Food # Hardlight
          - Produce
          - NFIngredient # Hardlight
    - hand:
        emptyLabel: borg-slot-food-empty
        emptyRepresentative: FoodBreakfastAmerican
        whitelist:
          tags:
          - Dinnerware
          - Skewer
          components:
          - Edible
        blacklist:
          tags:
          - Crayon
          components:
          - Clothing
          - Organ
    - item: KitchenKnife
    - item: RollingPin

  - type: BorgModuleIcon
    icon: { sprite: _Starlight/Interface/Actions/actions_borg.rsi, state: cooking-module }
