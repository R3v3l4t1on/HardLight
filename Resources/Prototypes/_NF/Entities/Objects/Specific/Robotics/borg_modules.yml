- type: entity
  id: BorgModuleAdvancedParamedic
  parent: [ BaseBorgModuleMedical, BaseProviderBorgModule ]
  name: chemical recovery cyborg module
  components:
  - type: Sprite
    layers:
    - state: medical
    - state: icon-paramedic
      sprite: _NF/Objects/Specific/Robotics/borgmodule.rsi
  - type: ItemBorgModule
  # Wizden start
    hands:
    - item: HandheldHealthAnalyzerUnpowered
    - item: BorgHypoTricordrazine
    - item: BorgHypoInaprovaline
    # Wizden end
  - type: BorgModuleIcon
    icon: { sprite: _NF/Interface/Actions/actions_borg.rsi, state: adv-paramed-module }

- type: entity
  id: BorgModuleJetpack
  parent: [ BaseBorgModule, BaseProviderBorgModule ]
  name: Frontier cyborg module
  components:
  - type: Sprite
    layers:
    - state: generic
    - state: icon-jetpack
      sprite: _NF/Objects/Specific/Robotics/borgmodule.rsi
  - type: ItemBorgModule
  # Wizden start
    hands:
    - item: JetpackMiniFilled
      hand:
        emptyRepresentative: JetpackMiniFilled
        emptyLabel: borg-placeholder-display-name-jetpack
        whitelist:
          components:
          - Jetpack
    - item: HandheldGPSBasic
    - item: HandheldStationMapUnpowered # Hardlight
    - item: HandHeldMassScannerBorg
    - item: BorgClock
    - hand:
      emptyRepresentative: SpaceCash1000
      emptyLabel: borg-slot-money
      whitelist:
        components:
        - Cash
    - hand:
      - emptyRepresentative: FuelPlasma
      - emptyLabel: borg-slot-fuel-empty
      whitelist:
        components:
        - NFFuel
    # Wizden end
  - type: BorgModuleIcon
    icon: { sprite: _NF/Interface/Actions/actions_borg.rsi, state: jetpack-module }

- type: entity
  id: BorgModuleRCDShipyard
  parent: [ BaseBorgModuleEngineering, BaseProviderBorgModule ]
  name: shipyard RCD cyborg module
  components:
  - type: Sprite
    layers:
    - state: engineering
    - state: icon-rcd-shipyard
      sprite: _NF/Objects/Specific/Robotics/borgmodule.rsi
  - type: ItemBorgModule
    hands:
    - item: ShipyardRCD
      hand:
        emptyRepresentative: ShipyardRCD
        emptyLabel: borg-placeholder-display-name-rcd
        whitelist:
          components:
          - RCD
    - hand:
      emptyRepresentative: ShipyardRCDAmmo
      emptyLabel: borg-placeholder-display-name-compressed-matter
      whitelist:
        components:
        - RCDAmmo
  - type: BorgModuleIcon
    icon: { sprite: _NF/Interface/Actions/actions_borg.rsi, state: shipyard-rcd-module }
